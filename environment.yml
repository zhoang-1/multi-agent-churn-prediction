  - pip:
    - crewai
    - crewai-tools
    - pyautogen
    - langgraph
    - langchain
    - langchain-openai
    - "fastapi[all]"
    - celery
    - psycopg2-binary
    - pymongo
    - kafka-python
    - pika
    - docker
    - imbalanced-learn
    - xgboost
    - lightgbm
    - tensorflow